workflows:
  android-apk:
    name: Klassin Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    # Since this file is in the client folder, we still set the working directory 
    # relative to the repo root for absolute clarity during cloning.
    working_directory: client
    environment:
      groups:
        - keystore_credentials 
      vars:
        PACKAGE_NAME: "com.atul004.klassin"
      node: 20
      java: 17
    scripts:
      - name: Decode Firebase Configs
        script: |
          # Decode to the root of the client folder
          echo $GOOGLE_SERVICES_B64 | base64 --decode > google-services.json
          echo $FCM_CONFIG | base64 --decode > fcm.json
          # Debug: check if file is valid JSON (first few chars)
          head -c 20 google-services.json
      - name: Install dependencies
        script: npm install
      - name: Prebuild Android Folder
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          # The prebuild may have failed to copy it correctly, let's force it
          cp google-services.json android/app/google-services.json
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - atul@your-email.com 
