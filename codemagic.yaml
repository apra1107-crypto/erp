workflows:
  android-apk:
    name: Klassin Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    # Since this file is in the client folder, we still set the working directory 
    # relative to the repo root for absolute clarity during cloning.
    working_directory: client
    environment:
      groups:
        - keystore_credentials 
      vars:
        PACKAGE_NAME: "com.atul004.klassin"
      node: 20
      java: 17
    scripts:
      - name: Decode Firebase Configs
        script: |
          # Use Python for reliable cross-platform base64 decoding
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('GOOGLE_SERVICES_B64', '')); f = open('google-services.json', 'wb'); f.write(data); f.close()"
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('FCM_CONFIG', '')); f = open('fcm.json', 'wb'); f.write(data); f.close()"
          
          # CRITICAL: Verify the file is not empty and is valid JSON
          if [ ! -s google-services.json ]; then
            echo "❌ ERROR: GOOGLE_SERVICES_B64 variable is empty or not found in Codemagic!"
            exit 1
          fi
          echo "✅ google-services.json created successfully"
      - name: Install dependencies
        script: npm install
      - name: Prebuild Android Folder
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          # The prebuild may have failed to copy it correctly, let's force it
          cp google-services.json android/app/google-services.json
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - atul@your-email.com 
