workflows:
  android-apk-production:
    name: Klassin Android APK Production
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: client
    environment:
      groups:
        - keystore_credentials 
      vars:
        PACKAGE_NAME: "com.atul004.klassin"
      node: 20
      java: 17
    scripts:
      - name: Decode Firebase Configs
        script: |
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('GOOGLE_SERVICES_B64', '')); f = open('google-services.json', 'wb'); f.write(data); f.close()"
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('FCM_CONFIG', '')); f = open('fcm.json', 'wb'); f.write(data); f.close()"
          if [ ! -s google-services.json ]; then echo "❌ ERROR: GOOGLE_SERVICES_B64 missing!"; exit 1; fi
          echo "✅ google-services.json created"
      - name: Install dependencies
        script: npm install
      - name: Prebuild Android Folder
        script: |
          # Clean build environment
          rm -rf .expo android
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          cp google-services.json android/app/google-services.json
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # FORCE ABI FILTERING AND MINIFICATION AT THE COMMAND LINE
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PminifyEnabled=true \
            -PshrinkResources=true \
            --no-daemon
          
          # --- DEBUG: ANALYZE THE APK SIZE ---
          echo "🔍 ANALYZING APK STRUCTURE..."
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            echo "✅ Found APK at $APK_PATH"
            echo "📦 APK Architectures (lib folder):"
            unzip -l "$APK_PATH" | grep "lib/" | cut -d'/' -f2 | sort | uniq
            echo "📊 Top 20 Largest Files in APK:"
            unzip -l "$APK_PATH" | sort -nr | head -n 20
          else
            echo "❌ APK not found for analysis!"
          fi
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - atul@your-email.com 

  android-apk-development:
    name: Klassin Android APK Development
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: client
    environment:
      groups:
        - keystore_credentials 
      vars:
        PACKAGE_NAME: "com.atul004.klassin"
        IS_DEV_BUILD: "true"
      node: 20
      java: 17
    scripts:
      - name: Decode Firebase Configs
        script: |
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('GOOGLE_SERVICES_B64', '')); f = open('google-services.json', 'wb'); f.write(data); f.close()"
          python3 -c "import base64, os; data = base64.b64decode(os.environ.get('FCM_CONFIG', '')); f = open('fcm.json', 'wb'); f.write(data); f.close()"
          if [ ! -s google-services.json ]; then echo "❌ ERROR: GOOGLE_SERVICES_B64 missing!"; exit 1; fi
          echo "✅ google-services.json created"
      - name: Install dependencies
        script: npm install
      - name: Prebuild Android Folder
        script: |
          # Clean build environment
          rm -rf .expo android
          npx expo prebuild --platform android --no-install
      - name: Build Android Debug APK
        script: |
          cp google-services.json android/app/google-services.json
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # FORCE ABI FILTERING AND MINIFICATION AT THE COMMAND LINE
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a \
            -PminifyEnabled=true \
            -PshrinkResources=true \
            --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - atul@your-email.com